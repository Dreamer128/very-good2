<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>중요한 질문이 있어!</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #ffeef8;
            font-family: 'Apple SD Gothic Neo', sans-serif;
            overflow: hidden;
        }

        h1 {
            color: #ff4d6d;
            margin-bottom: 50px;
            text-align: center;
        }
 
        /* 버튼들을 감싸는 컨테이너: 가로로 나란히, 중앙 정렬 */
        .btn-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 150px; /* 버튼 사이의 간격 */
            width: 100%;
            position: relative;
        }

        button {
            width: 100px;
            height: 50px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            /* 버튼들이 밀리지 않도록 고정 */
            flex-shrink: 0;
        }

        #yesBtn {
            background-color: #ff4d6d;
            color: white;
        }

        #noBtn {
            background-color: #adb5bd;
            color: white;
            position: relative;
            transition: none;
        }
    </style>
</head>
<body>

    <h1> 뭐 먹을래 ? </h1>
 
    <div class="btn-container">
        <button id="yesBtn" onclick="celebrate()"> test</button>
        <button id="noBtn" onmouseover="moveButton()"> 1</button>
        <button id="noBtn" onmouseover="moveButton()"> 2</button>
      <button id="noBtn" onmouseover="moveButton()"> 3</button>
    </div>

    <script>
        function moveButton() {
            const noBtn = document.getElementById('noBtn');
 
            // 마우스를 올리는 순간부터 자유롭게 화면을 돌아다니게 변경
            const x = Math.random() * (window.innerWidth - 100);
            const y = Math.random() * (window.innerHeight - 50);
 
            noBtn.style.position = 'fixed';
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        }

        function celebrate() {
            alert('123123123123');
            //location.href = "https://pwa.kakao.com/";
        }
    </script>
</body>
</html>
